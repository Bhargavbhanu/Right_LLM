replicaCount:
  backend: 3
  frontend: 2

image:
  repository: ghcr.io/right-llm
  backend: right-llm-backend
  frontend: right-llm-frontend
  tag: v0.1.0
  pullPolicy: IfNotPresent

service:
  backend:
    type: ClusterIP
    port: 8001
  frontend:
    type: ClusterIP
    port: 3000

ingress:
  enabled: true
  className: nginx
  host: rightllm.local
  tls: false

mongo:
  url: mongodb://mongo:27017
  dbName: rightllm

secrets:
  emergentLlmKey: ""
  groqApiKey: ""
  ollamaBaseUrl: ""
  awsAccessKeyId: ""
  awsSecretAccessKey: ""
  awsRegion: us-east-1
  azureOpenaiApiKey: ""
  azureOpenaiEndpoint: ""

resources:
  backend:
    requests: { cpu: 200m, memory: 256Mi }
    limits:   { cpu: 1,    memory: 1Gi }
  frontend:
    requests: { cpu: 50m,  memory: 64Mi }
    limits:   { cpu: 200m, memory: 256Mi }

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
  targetCPUUtilizationPercentage: 70
