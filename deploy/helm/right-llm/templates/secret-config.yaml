apiVersion: v1
kind: Secret
metadata:
  name: right-llm-secrets
  labels:
    app: right-llm
type: Opaque
stringData:
  EMERGENT_LLM_KEY: {{ .Values.secrets.emergentLlmKey | quote }}
  GROQ_API_KEY: {{ .Values.secrets.groqApiKey | quote }}
  OLLAMA_BASE_URL: {{ .Values.secrets.ollamaBaseUrl | quote }}
  AWS_ACCESS_KEY_ID: {{ .Values.secrets.awsAccessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.secrets.awsSecretAccessKey | quote }}
  AWS_REGION: {{ .Values.secrets.awsRegion | quote }}
  AZURE_OPENAI_API_KEY: {{ .Values.secrets.azureOpenaiApiKey | quote }}
  AZURE_OPENAI_ENDPOINT: {{ .Values.secrets.azureOpenaiEndpoint | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: right-llm-config
data:
  MONGO_URL: {{ .Values.mongo.url | quote }}
  DB_NAME: {{ .Values.mongo.dbName | quote }}
  CORS_ORIGINS: "*"
