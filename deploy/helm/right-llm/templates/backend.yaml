apiVersion: apps/v1
kind: Deployment
metadata:
  name: right-llm-backend
  labels: { app: right-llm, component: backend }
spec:
  replicas: {{ .Values.replicaCount.backend }}
  selector:
    matchLabels: { app: right-llm, component: backend }
  template:
    metadata:
      labels: { app: right-llm, component: backend }
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}/{{ .Values.image.backend }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8001
          envFrom:
            - configMapRef: { name: right-llm-config }
            - secretRef:    { name: right-llm-secrets }
          readinessProbe:
            httpGet: { path: /api/health, port: 8001 }
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /api/health, port: 8001 }
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources.backend | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: right-llm-backend
spec:
  type: {{ .Values.service.backend.type }}
  selector: { app: right-llm, component: backend }
  ports:
    - port: {{ .Values.service.backend.port }}
      targetPort: 8001
